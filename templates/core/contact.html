{% extends 'base.html' %}
{% block title %}Contact | Let's Connect{% endblock %}
{% block content %}
<div class="contact-section animate-up" style="max-width: 600px; margin: 0 auto;">
    <h1 class="gradient-text" style="text-align: center;">Get In Touch</h1>
    <p style="text-align: center; color: var(--text-muted); margin-bottom: 40px;">Interested in working together or just want to say hi?</p>
    
    <div class="glass" style="padding: 40px;">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required placeholder="Your Name">
            </div>
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" required placeholder="How can I help you?"></textarea>
            </div>
            <button type="submit" class="btn" style="width: 100%;">Send Message</button>
        </form>
    </div>
</div>
{% endblock %}
